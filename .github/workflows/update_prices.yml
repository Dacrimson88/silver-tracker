name: Ardent Data Sync

on:
  schedule:
    - cron: '*/30 * * * *' # Updates every 30 mins
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Market Data
        run: |
          # We use curl to grab the raw data and save it as data.json
          BUYS=$(curl -s https://ardent-industry.com/api/commodity/Silver/exporters)
          SELLS=$(curl -s https://ardent-industry.com/api/commodity/Silver/importers)
          echo "{\"buys\": $BUYS, \"sells\": $SELLS}" > data.json

      - name: Upload Website Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
