<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Silver Tracker (Ardent API)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #d4d4d4; font-family: 'Segoe UI', sans-serif; }
        .market-card { background: #1a1a1a; border: 1px solid #444; border-radius: 8px; padding: 20px; }
        .price-buy { color: #00d2ff; font-weight: bold; }
        .price-sell { color: #00ff88; font-weight: bold; }
        .header-accent { border-left: 5px solid #f28d1a; padding-left: 15px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2 class="header-accent mb-4">Silver Market <small class="text-muted">via Ardent Insight</small></h2>
        
        <div class="row">
            <div class="col-md-12">
                <div class="market-card">
                    <table class="table table-dark table-hover">
                        <thead>
                            <tr>
                                <th>System / Station</th>
                                <th>Buy Price</th>
                                <th>Sell Price</th>
                                <th>Supply/Demand</th>
                                <th>Last Updated</th>
                            </tr>
                        </thead>
                        <tbody id="market-data">
                            <tr><td colspan="5" class="text-center">Scanning frequencies...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchSilver() {
            try {
                // Endpoint for commodity 'silver'
                const response = await fetch('https://api.ardent-insight.com/v1/commodities/silver');
                const data = await response.json();
                
                const tableBody = document.getElementById('market-data');
                tableBody.innerHTML = ''; // Clear loading text

                // Ardent usually returns 'listings' or 'stations' array
                data.listings.slice(0, 10).forEach(entry => {
                    const row = `<tr>
                        <td><strong>${entry.systemName}</strong><br><small>${entry.stationName}</small></td>
                        <td class="price-buy">${entry.buyPrice.toLocaleString()} CR</td>
                        <td class="price-sell">${entry.sellPrice.toLocaleString()} CR</td>
                        <td>${entry.supply.toLocaleString()}</td>
                        <td>${new Date(entry.timestamp).toLocaleTimeString()}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            } catch (err) {
                document.getElementById('market-data').innerHTML = '<tr><td colspan="5" class="text-danger">Failed to connect to Ardent API.</td></tr>';
            }
        }
        fetchSilver();
    </script>
</body>
</html>
