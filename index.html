<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Silver Tracker</title>
    <style>
        body { background-color: #0a0a0a; color: #ff7100; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        h1 { border-bottom: 2px solid #ff7100; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background-color: #1a1a1a; }
        tr:hover { background-color: #222; }
        .profit { color: #00ff00; font-weight: bold; }
        button { background: #ff7100; color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #e66600; }
    </style>
</head>
<body>

    <h1>COMMODITY TRACKER: SILVER</h1>
    <p>Current Market Data - Galactic Average: <span id="avg-price">35,000</span> Cr</p>
    
    <button onclick="updatePrices()">REFRESH DATA</button>

    <table>
        <thead>
            <tr>
                <th>Station / System</th>
                <th>Buy Price</th>
                <th>Sell Price</th>
                <th>Potential Profit</th>
                <th>Last Seen</th>
            </tr>
        </thead>
        <tbody id="market-data">
            </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
